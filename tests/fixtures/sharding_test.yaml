appId: com.example.myapp

config:
  retry:
    count: 0

tests:
  - name: "Test A"
    tags: [smoke]
    steps:
      - launchApp: { appId: com.example.myapp, clearState: true }
      - assertVisible: { id: "home" }

  - name: "Test B"
    tags: [regression]
    steps:
      - launchApp: { appId: com.example.myapp, clearState: true }
      - tap: { id: "btn_b" }

  - name: "Test C"
